name: Release

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16  # Have the pgvector extension pre-installed
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Create omop_emb database user
        run: |
          PGPASSWORD=postgres psql -h localhost -U postgres -c \
            "CREATE USER omop_emb WITH PASSWORD 'omop_emb' CREATEDB;"

      - name: Pre-install vector extension in template1
        run: |
          PGPASSWORD=postgres psql -h localhost -U postgres -c \
            "CREATE EXTENSION IF NOT EXISTS vector;" template1

      - name: Configure omop_emb via oa-configurator
        run: |
          uv run omop-config configure omop_emb \
            --dialect postgresql+psycopg --database emb \
            --host localhost --port 5432 --cdm-schema public \
            --user omop_emb --password omop_emb --database-name omop_emb \
            --backend pgvector --provider-type ollama \
            --api-key ollama --api-base http://localhost:11434/v1 \
            --embedding-model test-model \
            --test-dialect postgresql+psycopg --test-database test_emb \
            --test-host localhost --test-port 5432 --test-cdm-schema public \
            --test-user omop_emb --test-password omop_emb --test-database-name test_omop_emb

      - name: Run tests
        run: uv run pytest

  release:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    concurrency: release
    permissions:
      id-token: write # Required for Trusted Publishing to PyPI
      contents: write # Required for Semantic Release to push tags/labels

    environment:
      name: pypi
      url: https://pypi.org/p/omop-emb

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Semantic Release
        id: semantic
        uses: cycjimmy/semantic-release-action@v6
        with:
          extra_plugins: |
            @semantic-release/changelog
            @semantic-release/git
            @semantic-release/exec
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Build and publish to PyPI
        if: steps.semantic.outputs.new_release_published == 'true'
        run: |
          uv build
          uv publish