services:
  omop-cdm-db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${OMOP_CDM_DB_USER:-omop}
      POSTGRES_PASSWORD: ${OMOP_CDM_DB_PASSWORD:-omop}
      POSTGRES_DB: ${OMOP_CDM_DB_NAME:-omop_cdm}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - cdm_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - omop-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${OMOP_CDM_DB_USER:-omop}"]
      interval: 5s
      timeout: 5s
      retries: 5

  omop-emb-db:
    image: pgvector/pgvector:pg18
    restart: always
    environment:
      POSTGRES_USER: ${OMOP_EMB_DB_USER:-omop}
      POSTGRES_PASSWORD: ${OMOP_EMB_DB_PASSWORD:-omop}
      POSTGRES_DB: ${OMOP_EMB_DB_NAME:-omop_emb}
    ports:
      - "5433:5432"
    volumes:
      - emb_data:/var/lib/postgresql
    command: >
      postgres
        -c shared_preload_libraries=vector
        -c maintenance_work_mem=512MB
        -c max_parallel_maintenance_workers=4
    networks:
      - omop-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${OMOP_EMB_DB_USER:-omop}"]
      interval: 5s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:0.30.4
    profiles: ["standalone"]
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    tty: true
    restart: always
    environment:
      - OLLAMA_KEEP_ALIVE=24h
      - OLLAMA_HOST=0.0.0.0
    networks:
      - omop-net
    stop_grace_period: 1m

  python-spires:
    build: .
    restart: unless-stopped
    depends_on:
      omop-cdm-db:
        condition: service_healthy
      omop-emb-db:
        condition: service_healthy
    volumes:
      - ${HOME}/.config/omop:/root/.config/omop
    networks:
      - omop-net
    command: >
      bash -c "
        omop-config configure omop_alchemy --skip-if-configured
          --conn-name cdm --dialect postgresql+psycopg
          --host omop-cdm-db --port 5432
          --user ${OMOP_CDM_DB_USER:-omop}
          --password ${OMOP_CDM_DB_PASSWORD:-omop}
          --database ${OMOP_CDM_DB_NAME:-omop_cdm} --cdm-schema omop &&
        omop-config configure omop_emb --skip-if-configured
          --conn-name emb --dialect postgresql+psycopg
          --host omop-emb-db --port 5432
          --user ${OMOP_EMB_DB_USER:-omop}
          --password ${OMOP_EMB_DB_PASSWORD:-omop}
          --database ${OMOP_EMB_DB_NAME:-omop_emb} &&
        sleep infinity
      "

networks:
  omop-net:
    name: omop-net

volumes:
  cdm_data:
  emb_data:
  ollama_data:
