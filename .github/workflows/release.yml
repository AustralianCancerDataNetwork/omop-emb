name: Release

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16  # Have the pgvector extension pre-installed
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      TEST_DB_HOST: localhost
      TEST_DB_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      TEST_DATABASE_NAME: test_omop_emb
      TEST_DB_USERNAME: test
      TEST_DB_PASSWORD: test

    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Run tests
        run: uv run pytest

  release:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    concurrency: release
    permissions:
      id-token: write # Required for Trusted Publishing to PyPI
      contents: write # Required for Semantic Release to push tags/labels

    environment:
      name: pypi
      url: https://pypi.org/p/omop-emb

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          # Use GITHUB_TOKEN for standard releases
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Semantic Release
        id: semantic
        uses: cycjimmy/semantic-release-action@v6
        with:
          extra_plugins: |
            @semantic-release/changelog
            @semantic-release/git
            @semantic-release/exec
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install uv
        if: steps.semantic.outputs.new_release_published == 'true'
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"

      - name: Build and publish to PyPI
        if: steps.semantic.outputs.new_release_published == 'true'
        run: |
          uv build
          # uv uses the id-token permission for OIDC "Trusted Publishing"
          uv publish